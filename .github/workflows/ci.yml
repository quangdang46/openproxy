name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

# Cancel any in-flight CI run on the same ref when a new push lands.
# Spares ~30 minutes of runner time per stacked push to a branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Web: lint + typecheck + build the Astro dashboard.
  #
  # Runs unconditionally — the resulting web/dist/ is required by build.rs
  # before any Rust compile step in this workflow.
  # ──────────────────────────────────────────────────────────────────────
  web:
    name: Web (Astro)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install deps
        working-directory: web
        run: pnpm install --frozen-lockfile

      # `astro check` runs the TypeScript compiler against .astro/.ts/.tsx
      # files and surfaces type errors that `pnpm run build` only catches
      # for content collections. Advisory until the web side is clean —
      # tighten by removing `|| true` once green.
      - name: astro check (advisory)
        working-directory: web
        run: pnpm exec astro check || true

      - name: Build dashboard
        working-directory: web
        run: pnpm run build

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────
  # NOTE: tests/unit/*.test.js exists in the tree but imports `vitest`
  # and resolves `../../open-sse/...` source modules — both leftovers
  # from upstream decolua/9router (the Node project this repo was
  # forked from before being rewritten in Rust). The JS source has
  # since been deleted; only the test files remain. We intentionally
  # do NOT run them in CI. Once they're either ported to native
  # `node:test` against the Rust binary or deleted, replace this
  # comment with an actual `js-tests` job.
  # ──────────────────────────────────────────────────────────────────────

  # ──────────────────────────────────────────────────────────────────────
  # Rust: fmt + clippy + tests on Linux and macOS only.
  #
  # We previously matrixed Windows too, but the release workflow does not
  # ship a Windows binary, and the Rust crate doesn't have Windows-specific
  # code paths beyond what cargo/rustc already validates per-target. Once
  # release.yml gains a Windows target, re-add `windows-latest` here.
  # ──────────────────────────────────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [web]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Download dashboard artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Per-OS key so PRs on different runners don't collide.
          key: ${{ matrix.os }}

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy (advisory)
        # Pre-existing lints in the codebase are not gated by CI yet.
        # This step compiles all targets and surfaces clippy diagnostics
        # without failing the build. Tighten to `-D warnings` once the
        # codebase is clean.
        run: cargo clippy --all-targets --all-features

      - name: cargo test (Linux only)
        # The integration test suite has Linux-specific assumptions in
        # several places (HOME-redirect for CLI tool detection in
        # cli_tool_native_settings_api.rs and cowork_settings_api.rs;
        # POSIX shell-out in src/server/api/cli_tools.rs unit tests).
        # macOS still runs fmt + clippy above as a build/compile gate.
        # Cross-platform binary builds are validated end-to-end in
        # .github/workflows/release.yml.
        if: runner.os == 'Linux'
        run: cargo test --all-features
