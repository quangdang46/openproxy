name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build dashboard
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy (advisory)
        # Pre-existing lints in the codebase are not gated by CI yet.
        # This step compiles all targets and surfaces clippy diagnostics
        # without failing the build. Tighten to `-D warnings` once the
        # codebase is clean.
        run: cargo clippy --all-targets --all-features

      - name: cargo test (Linux — canonical, full suite)
        if: runner.os == 'Linux'
        run: cargo test --all-features

      - name: cargo test (macOS / Windows — partial)
        if: runner.os != 'Linux'
        shell: bash
        # tests/cli_tool_native_settings_api.rs has 10 pre-existing tests
        # (copilot/droid/hermes/openclaw/opencode × 2 each) that fail on
        # macOS/Windows runners due to platform-specific HOME-redirect +
        # system binary detection. The first panic poisons the shared
        # ENV_LOCK mutex and cascades. Skipping by test-name prefix until
        # the test file gets a per-platform cleanup pass.
        run: |
          cargo test --all-features -- \
            --skip copilot_settings_ \
            --skip droid_settings_ \
            --skip hermes_settings_ \
            --skip openclaw_settings_ \
            --skip opencode_settings_
