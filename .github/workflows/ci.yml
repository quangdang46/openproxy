name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build dashboard
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy (advisory)
        # Pre-existing lints in the codebase are not gated by CI yet.
        # This step compiles all targets and surfaces clippy diagnostics
        # without failing the build. Tighten to `-D warnings` once the
        # codebase is clean.
        run: cargo clippy --all-targets --all-features

      - name: cargo test (Linux — canonical, full suite)
        if: runner.os == 'Linux'
        run: cargo test --all-features

      - name: cargo test (macOS / Windows — partial)
        if: runner.os != 'Linux'
        # tests/cli_tool_native_settings_api.rs has pre-existing platform
        # dependencies (HOME-redirection + system binary detection for
        # copilot/codex/droid/hermes/openclaw/opencode) that fail on macOS
        # and Windows runners. The first panic poisons the shared ENV_LOCK
        # mutex and cascades. Tracked for cleanup; not blocking distribution.
        run: cargo test --all-features -- --skip cli_tool_native_settings_api
