name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always
  # Force colored cargo output even when stdout isn't a TTY.

permissions:
  contents: write   # required by softprops/action-gh-release
  id-token: write   # required by `npm publish --provenance`

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # 0) Sanity gate: refuse to release if Cargo.toml, the meta package.json,
  #    and every platform package.json don't already match the tag.
  #
  # The stage-npm-binaries.mjs script rewrites every manifest at publish
  # time, but we still want a hard fail here if the tag was cut from a
  # commit where the manifests had drifted — that way the released GitHub
  # tarball and the npm package always agree on what `--version` prints.
  # ──────────────────────────────────────────────────────────────────────
  verify-versions:
    name: Verify manifest versions match tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare versions
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          CARGO=$(awk '/^\[package\]/{p=1; next} p && /^\[/{exit} p && /^[[:space:]]*version[[:space:]]*=/{
            match($0, /"[^"]+"/); print substr($0, RSTART+1, RLENGTH-2); exit
          }' Cargo.toml)
          META=$(node -p "require('./packages/openproxy/package.json').version")
          echo "tag                    $TAG"
          echo "Cargo.toml             $CARGO"
          echo "packages/openproxy     $META"
          fail=0
          if [ "$CARGO" != "$TAG" ]; then
            echo "::error::Cargo.toml ($CARGO) does not match tag ($TAG)"
            fail=1
          fi
          if [ "$META" != "$TAG" ]; then
            echo "::error::packages/openproxy ($META) does not match tag ($TAG)"
            fail=1
          fi
          for d in packages/platform/*/; do
            v=$(node -p "require('./${d}package.json').version")
            name=$(basename "$d")
            echo "platform/${name}     $v"
            if [ "$v" != "$TAG" ]; then
              echo "::error::platform/${name} ($v) does not match tag ($TAG)"
              fail=1
            fi
          done
          exit $fail

  # ──────────────────────────────────────────────────────────────────────
  # 1) Build platform binaries.
  #
  # Each job builds the dashboard with pnpm, then cross-compiles (Linux
  # targets) or natively builds (macOS targets) the Rust binary with the
  # embedded `web/dist/`. Output is a `<asset>.tar.gz` + `<asset>.tar.gz.sha256`
  # uploaded as a workflow artifact.
  # ──────────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    needs: [verify-versions]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
            suffix: linux-x86_64
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
            suffix: linux-aarch64
          - target: x86_64-apple-darwin
            runner: macos-latest
            use_cross: false
            suffix: macos-x86_64
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
            suffix: macos-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build dashboard
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/openproxy"
          if [ "${{ runner.os }}" = "Linux" ]; then
            # cross images already include strip; skip if missing.
            command -v strip >/dev/null && strip "$BIN" || true
          else
            strip -x "$BIN" || true
          fi
          ls -lh "$BIN"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"  # e.g. v0.1.0
          STAGE="$(mktemp -d)"
          cp "target/${{ matrix.target }}/release/openproxy" "$STAGE/openproxy"
          # Optional ride-alongs that explain what the user just downloaded.
          [ -f LICENSE ] && cp LICENSE "$STAGE/LICENSE" || true
          [ -f README.md ] && cp README.md "$STAGE/README.md" || true

          ARCHIVE="openproxy-${VERSION}-${{ matrix.suffix }}.tar.gz"
          tar -czf "$ARCHIVE" -C "$STAGE" .

          # Sidecar checksum file. Use sha256sum where available; macOS uses shasum.
          if command -v sha256sum >/dev/null; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi
          ls -lh "$ARCHIVE" "$ARCHIVE.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openproxy-${{ matrix.suffix }}
          path: |
            openproxy-*.tar.gz
            openproxy-*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────
  # 2) Aggregate artifacts and create the GitHub Release.
  # ──────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show what we'll attach
        run: ls -lh dist

      - name: Generate combined SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          # One canonical sums file in addition to the per-archive sidecars.
          sha256sum openproxy-*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/openproxy-*.tar.gz
            dist/openproxy-*.tar.gz.sha256
            dist/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: false

  # ──────────────────────────────────────────────────────────────────────
  # 3) Publish npm packages — TEMPORARILY DISABLED.
  #
  # The npm side of the release is currently turned off. Reasons:
  #   - The NPM_TOKEN secret in this repo no longer has publish access to
  #     the @openprx scope (every release since v0.1.1 failed here with
  #     "404 Not Found - PUT" on the platform packages).
  #   - The packages on the registry (@openprx/openproxy and its four
  #     platform sub-packages) are stuck at 0.1.1 until the token is
  #     rotated. See README.md install instructions and `gh secret list`.
