name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always
  # Force colored cargo output even when stdout isn't a TTY.

permissions:
  contents: write   # required by softprops/action-gh-release

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # 1) Build platform binaries.
  #
  # Each job builds the dashboard with pnpm, then cross-compiles (Linux
  # targets) or natively builds (macOS targets) the Rust binary with the
  # embedded `web/dist/`. Output is a `<asset>.tar.gz` + `<asset>.tar.gz.sha256`
  # uploaded as a workflow artifact.
  # ──────────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
            suffix: linux-x86_64
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
            suffix: linux-aarch64
          - target: x86_64-apple-darwin
            runner: macos-latest
            use_cross: false
            suffix: macos-x86_64
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
            suffix: macos-aarch64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
            suffix: windows-x86_64
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build dashboard
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/openproxy"
          if [ "${{ runner.os }}" = "Linux" ]; then
            # cross images already include strip; skip if missing.
            command -v strip >/dev/null && strip "$BIN" || true
          else
            strip -x "$BIN" || true
          fi
          ls -lh "$BIN"

      # Linux + macOS: tar.gz with the binary + LICENSE + README at the top level.
      - name: Package (tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"  # e.g. v0.1.0
          STAGE="$(mktemp -d)"
          cp "target/${{ matrix.target }}/release/openproxy" "$STAGE/openproxy"
          # Optional ride-alongs that explain what the user just downloaded.
          [ -f LICENSE ] && cp LICENSE "$STAGE/LICENSE" || true
          [ -f README.md ] && cp README.md "$STAGE/README.md" || true

          ARCHIVE="openproxy-${VERSION}-${{ matrix.suffix }}.tar.gz"
          tar -czf "$ARCHIVE" -C "$STAGE" .

          # Sidecar checksum file. Use sha256sum where available; macOS uses shasum.
          if command -v sha256sum >/dev/null; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi
          ls -lh "$ARCHIVE" "$ARCHIVE.sha256"

      # Windows: .zip with openproxy.exe + LICENSE + README at the top level.
      # install.ps1 expects this exact layout (`Expand-Archive` + walk to find
      # openproxy.exe).
      - name: Package (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $Version = $env:GITHUB_REF_NAME
          $Stage   = New-Item -ItemType Directory -Path (Join-Path $env:RUNNER_TEMP "stage-$Version") -Force
          Copy-Item "target/${{ matrix.target }}/release/openproxy.exe" (Join-Path $Stage "openproxy.exe")
          if (Test-Path LICENSE)   { Copy-Item LICENSE   (Join-Path $Stage "LICENSE") }
          if (Test-Path README.md) { Copy-Item README.md (Join-Path $Stage "README.md") }

          $Archive = "openproxy-$Version-${{ matrix.suffix }}.zip"
          # Compress-Archive across the staged contents, not the dir itself,
          # so the archive root matches the tar.gz layout on the other targets.
          Compress-Archive -Path (Join-Path $Stage '*') -DestinationPath $Archive -Force
          $hash = (Get-FileHash -LiteralPath $Archive -Algorithm SHA256).Hash.ToLower()
          # Match the GNU sha256sum output format: "<hash>  <filename>"
          "$hash  $Archive" | Out-File -FilePath "$Archive.sha256" -Encoding ascii -NoNewline
          Get-Item $Archive, "$Archive.sha256" | Format-Table Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openproxy-${{ matrix.suffix }}
          path: |
            openproxy-*.tar.gz
            openproxy-*.tar.gz.sha256
            openproxy-*.zip
            openproxy-*.zip.sha256
          if-no-files-found: error
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────
  # 2) Aggregate artifacts and create the GitHub Release.
  # ──────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show what we'll attach
        run: ls -lh dist

      - name: Generate combined SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          # One canonical sums file in addition to the per-archive sidecars.
          # Globs that match nothing are pruned by shopt -s nullglob; without
          # that, sha256sum would error if a target type wasn't built.
          shopt -s nullglob
          archives=( openproxy-*.tar.gz openproxy-*.zip )
          sha256sum "${archives[@]}" > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/openproxy-*.tar.gz
            dist/openproxy-*.tar.gz.sha256
            dist/openproxy-*.zip
            dist/openproxy-*.zip.sha256
            dist/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: false
